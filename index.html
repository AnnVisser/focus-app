<!doctype html>
<html>
	<head>
		<meta
			name="viewport"
			content="width=device-width, initial-scale=1.0"
			charset="UTF-8"
		/>
		<title>Focus App</title>
		<link rel="stylesheet" href="style.css" />
	</head>
	<body>
		<h1>Focus</h1>

		<div class="buttons">
			<button onclick="startActivity('Analyse')">🧠</button>
			<button onclick="startActivity('Overleg')">💬</button>
			<button onclick="startActivity('Ad-hoc')">⚡</button>
			<button onclick="startActivity('Documentatie')">📃</button>
		</div>

		<h2 id="context"></h2>
		<h3 id="timer">00:00:00</h3>

		<div class="buttons">
			<button onclick="stopActivity()">🛑</button>
			<button onclick="registerDistraction()">🦋</button>
		</div>

		<p id="distractions">Afleidingen: 0</p>
		<p id="switchesToday">Taakwissels vandaag: 0</p>
		<h2>Activiteiten</h2>
		<ul id="activityList"></ul>

		<div id="active"></div>
		<script src="db.js"></script>
		<script src="app.js"></script>
	</body>
</html>
